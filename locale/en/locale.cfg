[entity-name]
ata-deployer=Train Deployer
ata-deployer-stop=Train Deployer Stop
ata-deployer-output=Train Deployer Output
ata-monitor=Train Monitor

[entity-description]
ata-deployer=Automatically builds and deploys trains from stored items when circuit template signals are positive. Park a train here to save it as a template.
ata-monitor=Monitors the train network and outputs train counts and utilization per schedule pattern to the circuit network.

[item-name]
ata-deployer=Train Deployer
ata-monitor=Train Monitor

[item-description]
ata-deployer=Place on rails. Deploys one train per cycle when a template signal is positive. Items consumed from internal inventory.
ata-monitor=Place anywhere. Auto-discovers train types and outputs counts (signal-0..9) and utilization % (signal-A..J).

[recipe-name]
ata-deployer=Train Deployer
ata-monitor=Train Monitor

[technology-name]
ata-auto-train-deployment=Automatic Train Deployment

[technology-description]
ata-auto-train-deployment=Enables automatic deployment of trains based on circuit network demand.

[virtual-signal-name]
ata-template-1=Train Template 1
ata-template-2=Train Template 2
ata-template-3=Train Template 3
ata-template-4=Train Template 4
ata-template-5=Train Template 5
ata-template-6=Train Template 6
ata-template-7=Train Template 7
ata-template-8=Train Template 8
ata-status=Deployer Status

[virtual-signal-description]
ata-template-1=Positive value triggers deployment of one matching template train per cycle. Maps to Template slot 1.
ata-template-2=Positive value triggers deployment of one matching template train per cycle. Maps to Template slot 2.
ata-template-3=Positive value triggers deployment of one matching template train per cycle. Maps to Template slot 3.
ata-template-4=Positive value triggers deployment of one matching template train per cycle. Maps to Template slot 4.
ata-template-5=Positive value triggers deployment of one matching template train per cycle. Maps to Template slot 5.
ata-template-6=Positive value triggers deployment of one matching template train per cycle. Maps to Template slot 6.
ata-template-7=Positive value triggers deployment of one matching template train per cycle. Maps to Template slot 7.
ata-template-8=Positive value triggers deployment of one matching template train per cycle. Maps to Template slot 8.
ata-status=0=Idle, 1=Building, 2=Error

[mod-setting-name]
ata-deployer-update-rate=Deployer update rate (ticks)
ata-monitor-update-rate=Monitor update rate (ticks)
ata-depot-pattern=Depot station name pattern

[mod-setting-description]
ata-deployer-update-rate=How often deployers check circuit signals and deploy trains. Default: 1800 (30 seconds).
ata-monitor-update-rate=How often monitors refresh train counts. Lower = more responsive but higher UPS cost. Default: 60 (1 second).
ata-depot-pattern=Comma-separated list of patterns. Trains waiting at stations whose name contains any of these are counted as idle. Default: depot,D.
